<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Akun Aman</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .card-header {
            background-color: #1e3a8a;
            color: white;
            text-align: center;
            padding: 1.5rem;
        }
        .card-header h4 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .card-body {
            padding: 2rem;
        }
        .mb-3 {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
        }
        .form-control {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-text {
            display: block;
            margin-top: 0.375rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-primary:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }
        .text-center {
            text-align: center;
        }
        .mt-3 {
            margin-top: 1.25rem;
        }
        .text-muted {
            color: #64748b;
            font-size: 0.9rem;
        }
        .text-decoration-none {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }
        .text-decoration-none:hover {
            text-decoration: underline;
        }
        /* Alerts */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .alert-success {
            background-color: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
        .alert-danger {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .d-none {
            display: none !important;
        }
        /* Simple spinner */
        .spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h4>Registrasi Akun Baru</h4>
            </div>
            <div class="card-body">
                <div id="statusAlert" class="alert d-none" role="alert"></div>
                <form id="formRegister" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Alamat Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <small id="passHelp" class="form-text">Harus mengandung min 6 karakter, huruf kapital, angka, & simbol.</small>
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span id="btnText">Daftar Akun</span>
                        <span id="btnSpinner" class="spinner d-none"></span>
                    </button>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted">Sudah punya akun?
                        <a href="index.html" class="text-decoration-none">Login di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formRegister').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const alertElement = document.getElementById('statusAlert');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            submitBtn.disabled = true;
            btnText.textContent = "Sedang Memproses...";
            btnSpinner.classList.remove('d-none');
            alertElement.classList.add('d-none');

            try {
                const response = await fetch('api/register_process.php', {
                    method: 'POST',
                    body: new FormData(form)
                });
                const data = await response.json();
                
                alertElement.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (response.ok) {
                    alertElement.classList.add('alert-success');
                    alertElement.textContent = data.message;
                    form.reset();
                } else {
                    alertElement.classList.add('alert-danger');
                    alertElement.textContent = data.message || "Gagal melakukan registrasi.";
                }
            } catch (error) {
                alertElement.classList.remove('d-none', 'alert-success');
                alertElement.classList.add('alert-danger');
                alertElement.textContent = "Gagal menghubungi server. Periksa koneksi lokal Anda.";
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = "Daftar Akun";
                btnSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
