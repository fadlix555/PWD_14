<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Akun Aman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Registrasi Akun Baru</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="statusAlert" class="alert d-none" role="alert"></div>
                        <form id="formRegister" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Alamat Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <small id="passHelp" class="form-text text-muted">Harus mengandung min 6 karakter, huruf kapital, angka, & simbol.</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitBtn">
                                <span id="btnText">Daftar Akun</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="mb-1 text-muted">Sudah punya akun?
                            <a href="index.html" class="text-decoration-none">Login di sini</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formRegister').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const alertElement = document.getElementById('statusAlert');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Set UI ke mode Loading State
            submitBtn.disabled = true;
            btnText.textContent = "Sedang Memproses...";
            btnSpinner.classList.remove('d-none');
            alertElement.classList.add('d-none');

            try {
                const response = await fetch('api/register_process.php', {
                    method: 'POST',
                    body: new FormData(form)
                });
                const data = await response.json();
                
                alertElement.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (response.ok) {
                    alertElement.classList.add('alert-success');
                    alertElement.textContent = data.message;
                    form.reset();
                } else {
                    alertElement.classList.add('alert-danger');
                    alertElement.textContent = data.message || "Gagal melakukan registrasi.";
                }
            } catch (error) {
                alertElement.classList.remove('d-none', 'alert-success');
                alertElement.classList.add('alert-danger');
                alertElement.textContent = "Gagal menghubungi server. Periksa koneksi lokal Anda.";
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = "Daftar Akun";
                btnSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
