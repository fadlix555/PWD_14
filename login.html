<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-3 mt-5">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Secure User Login</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="statusAlert" class="alert d-none" role="alert"></div>
                        <form id="formLogin" novalidate>
                            <div class="mb-3">
                                <label for="identity" class="form-label fw-semibold">Username atau Email</label>
                                <input type="text" class="form-control" id="identity" name="identity" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitBtn">
                                <span id="btnText">Masuk Ke Sistem</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </form>
                        
                        <div class="text-center mt-3 border-top pt-3">
                            <p class="mb-1 text-muted">Belum memiliki akun?
                                <a href="index.html" style="text-decoration: none;">Daftar Akun Baru</a>
                            </p>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const alertElement = document.getElementById('statusAlert');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            submitBtn.disabled = true;
            btnText.textContent = "Mengautentikasi...";
            btnSpinner.classList.remove('d-none');
            alertElement.classList.add('d-none');

            try {
                const response = await fetch('login_process.php', {
                    method: 'POST',
                    body: new FormData(form)
                });
                const data = await response.json();

                alertElement.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (response.ok) {
                    alertElement.classList.add('alert-success');
                    alertElement.textContent = data.message;
                    setTimeout(() => window.location.href = 'dashboard.php', 1500);
                } else {
                    alertElement.classList.add('alert-danger');
                    alertElement.textContent = data.message;
                }
            } catch (error) {
                alertElement.classList.remove('d-none');
                alertElement.classList.add('alert-danger');
                alertElement.textContent = "Koneksi ke server gagal.";
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = "Masuk Ke Sistem";
                btnSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
